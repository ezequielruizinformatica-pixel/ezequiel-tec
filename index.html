<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ezequiel Tec</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="inicio" class="tela">
  <h1>🤖 OLÁ, SOU O EZEQUIEL TEC</h1>
  <p style="font-size:18px;">Bem-vindo! Toque na opção abaixo:</p>
  <button onclick="mostrarAluno()">🎒 Sou Aluno</button>
  <button onclick="mostrarVisitante()">👩‍💼 Sou Visitante</button>
</div>

<div id="aluno" class="tela escondido">
  <h2>Como você está hoje?</h2>
  <button onclick="voltarAutomatico()">😀 Feliz</button>
  <button onclick="voltarAutomatico()">😐 Normal</button>
  <button onclick="voltarAutomatico()">😔 Triste</button>
  <button onclick="voltar()">⬅ Voltar</button>
</div>

<div id="visitante" class="tela escondido">
  <h2>Qual o motivo da visita?</h2>
  <button>Matrícula</button>
  <button>Reunião</button>
  <button>Outro</button>
  <button onclick="voltar()">⬅ Voltar</button>
</div>

  <img id="preview" style="width:80%; margin-top:15px; border-radius:15px;" />

  <div id="qrcode" style="margin-top:20px;"></div>

  <br>
  <button onclick="voltar()">⬅ Voltar</button>
</div>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
