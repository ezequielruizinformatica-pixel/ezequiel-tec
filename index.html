<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezequiel Tec</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= TELA INICIAL ================= -->

<div id="inicio" class="tela">
  <h1 class="titulo">Olá, me chamo Ezequiel Tec. Quem é você?</h1>

  <div class="painel-botoes">
    <button class="btn aluno" onclick="mostrarAluno()">
      🎒
      <span>Sou Aluno</span>
    </button>

    <button class="btn visitante" onclick="mostrarVisitante()">
      👔
      <span>Sou Visitante</span>
    </button>
  </div>
</div>

<!-- ================= TELA ALUNO ================= -->

<div id="aluno" class="tela escondido">
  <h2>Como você está hoje?</h2>

  <div class="painel-botoes">
    <button class="btn opcao feliz" onclick="irParaMateria()">
      😀
      <span>Feliz</span>
    </button>

    <button class="btn opcao normal" onclick="irParaMateria()">
      😐
      <span>Normal</span>
    </button>

    <button class="btn opcao triste" onclick="irParaMateria()">
      😔
      <span>Triste</span>
    </button>
  </div>

  <button class="btn voltar" onclick="voltar()">
    ⬅
    <span>Voltar</span>
  </button>
</div>

<!-- ================= TELA MATÉRIA ================= -->

<div id="materia" class="tela escondido">
  <h2>Qual é sua matéria favorita?</h2>

  <div class="painel-botoes">
    <button class="btn opcao portugues" onclick="irParaTurno()">📖<span>Português</span></button>

    <button class="btn opcao matematica" onclick="irParaTurno()">➗<span>Matemática</span></button>

    <button class="btn opcao ciencias" onclick="irParaTurno()">🔬<span>Ciências</span></button>

    <button class="btn opcao historia" onclick="irParaTurno()">🏺<span>História</span></button>

    <button class="btn opcao geografia" onclick="irParaTurno()">🌎<span>Geografia</span></button>

    <button class="btn opcao ingles" onclick="irParaTurno()">🇺🇸<span>Inglês</span></button>

    <button class="btn opcao edfisica" onclick="irParaTurno()">🏃<span>Educação Física</span></button>

    <button class="btn opcao artes" onclick="irParaTurno()">🎨<span>Ensino das Artes</span></button>

    <button class="btn opcao religioso" onclick="irParaTurno()">✝<span>Ensino Religioso</span></button>
  </div>

  <button class="btn voltar" onclick="voltarParaAluno()">
    ⬅
    <span>Voltar</span>
  </button>
</div>

  <!-- ================= TELA TURNO ================= -->

<div id="turno" class="tela escondido">
  <h2>Seu professor favorito é de qual turno?</h2>

  <div class="painel-botoes">

    <button class="btn opcao matutino" onclick="irParaProfessor()">
      🌅
      <span>Matutino</span>
    </button>

    <button class="btn opcao vespertino" onclick="irParaProfessor()">
      🌇
      <span>Vespertino</span>
    </button>

  </div>

  <button class="btn voltar" onclick="voltarParaMateria()">
    ⬅
    <span>Voltar</span>
  </button>
</div>
  
  <!-- ================= TELA PROFESSOR ================= -->

<div id="professor" class="tela escondido">
  <h2>Qual é seu professor favorito?</h2>

  <div class="painel-botoes">

    <button class="btn opcao prof1">
      👩‍🏫
      <span>Profª Ana</span>
    </button>

    <button class="btn opcao prof2">
      👨‍🏫
      <span>Prof. Carlos</span>
    </button>

    <button class="btn opcao prof3">
      👩‍🏫
      <span>Profª Juliana</span>
    </button>

    <button class="btn opcao prof4">
      👨‍🏫
      <span>Prof. Marcos</span>
    </button>

  </div>

  <button class="btn voltar" onclick="voltarParaMateria()">
    ⬅
    <span>Voltar</span>
  </button>
</div>
  
<!-- ================= TELA VISITANTE ================= -->

<div id="visitante" class="tela escondido">
  <h2>Para onde você deseja ir?</h2>

  <div class="painel-botoes">
    <button class="btn opcao diretoria"
            onclick="mostrarMapa('Diretoria', 'diretoria.jpeg')">
      👔<span>Diretoria</span>
    </button>

    <button class="btn opcao secretaria"
            onclick="mostrarMapa('Secretaria', 'secretaria.jpeg')">
      🏢<span>Secretaria</span>
    </button>

    <button class="btn opcao professores"
            onclick="mostrarMapa('Sala dos Professores', 'professores.jpeg')">
      👩‍🏫<span>Sala dos Professores</span>
    </button>

    <button class="btn opcao salas"
            onclick="mostrarMapa('Salas de Aula', 'salas.png')">
      📚<span>Salas de Aula</span>
    </button>

    <button class="btn opcao banheiros"
            onclick="mostrarMapa('Banheiros', 'banheiros.jpeg')">
      🚻<span>Banheiros</span>
    </button>

    <button class="btn opcao quadra"
            onclick="mostrarMapa('Quadra da Escola', 'quadra.png')">
      🏀<span>Quadra da Escola</span>
    </button>
  </div>

  <button class="btn voltar" onclick="voltar()">
    ⬅
    <span>Voltar</span>
  </button>
</div>

<!-- ================= TELA MAPA ================= -->

<div id="mapa" class="tela escondido">
  <h2 id="titulo-mapa">Local</h2>

  <img id="imagem-mapa" src="" alt="Mapa do local"
       style="max-width: 100%; border-radius: 20px; margin-top: 20px;">

  <button class="btn voltar" onclick="voltarParaVisitante()">
    ⬅
    <span>Voltar</span>
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
