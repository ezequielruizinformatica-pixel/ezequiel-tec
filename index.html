<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezequiel Tec</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= TELA INICIAL ================= -->

<div id="inicio" class="tela">
  <h1 class="titulo">Olá! Quem é você?</h1>

  <div class="painel-botoes">
    <button class="btn aluno" onclick="mostrarAluno()">
      🎒
      <span>Sou Aluno</span>
    </button>

    <button class="btn visitante" onclick="mostrarVisitante()">
      👔
      <span>Sou Visitante</span>
    </button>
  </div>
</div>

<!-- ================= TELA ALUNO ================= -->

<div id="aluno" class="tela escondido">
  <h2>Como você está hoje?</h2>

  <div class="painel-botoes">
    <button class="btn opcao feliz">
      😀
      <span>Feliz</span>
    </button>

    <button class="btn opcao normal">
      😐
      <span>Normal</span>
    </button>

    <button class="btn opcao triste">
      😔
      <span>Triste</span>
    </button>
  </div>

  <button class="btn voltar" onclick="voltar()">
    ⬅
    <span>Voltar</span>
  </button>
</div>

<!-- ================= TELA VISITANTE ================= -->

<div id="visitante" class="tela escondido">
  <h2>Qual o motivo da visita?</h2>

  <div class="painel-botoes">
    <button class="btn opcao matricula">
      📝
      <span>Matrícula</span>
    </button>

    <button class="btn opcao reuniao">
      🤝
      <span>Reunião</span>
    </button>

    <button class="btn opcao outro">
      ❓
      <span>Outro</span>
    </button>
  </div>

  <button class="btn voltar" onclick="voltar()">
    ⬅
    <span>Voltar</span>
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
